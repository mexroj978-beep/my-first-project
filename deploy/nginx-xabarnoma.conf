# nginx — Maktab Xabarnoma (HTTPS reverse proxy)
# Faylni: /etc/nginx/sites-available/xabarnoma ga nusxalang
# sudo ln -s /etc/nginx/sites-available/xabarnoma /etc/nginx/sites-enabled/
# sudo certbot --nginx -d xabarnoma.example.com
# sudo nginx -t && sudo systemctl reload nginx

upstream xabarnoma_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name xabarnoma.example.com;

    # Let's Encrypt tekshiruvi
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name xabarnoma.example.com;

    ssl_certificate     /etc/letsencrypt/live/xabarnoma.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xabarnoma.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 10M;

    location / {
        proxy_pass http://xabarnoma_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
